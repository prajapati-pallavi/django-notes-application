version: "3.8"

services:
  nginx:
    build: ./nginx latest
    container_name: nginx_cont
    ports:
      - "80:80"
    depends_on:
      - django_app
    restart: unless-stopped
    networks:
      - notes-app-nw

  django_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_cont
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn notesapp.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - notes-app-nw

  db:
    image: mysql:8
    container_name: mysql_cont
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: notesdb
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
    networks:
      - notes-app-nw

networks:
  notes-app-nw:
    driver: bridge
